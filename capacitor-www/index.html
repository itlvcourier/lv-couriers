<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>LV Couriers</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #0d0f14;
        color: #f6f7fa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        text-align: center;
      }
      .badge {
        width: 64px; height: 64px;
        border-radius: 16px;
        background: #f25c2a;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 24px;
      }
      h1 { font-size: 20px; margin: 0; }
      p { margin: 0; color: #9aa3b2; max-width: 320px; line-height: 1.5; }
      button {
        margin-top: 8px;
        background: #f25c2a; color: #fff; border: 0;
        padding: 12px 24px; border-radius: 12px; font-size: 15px; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge">LV</div>
      <h1>Connection lost</h1>
      <p>We can't reach the server right now. Check your internet connection and try again.</p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
